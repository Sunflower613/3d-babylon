<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>虚空擂台PK | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  
</head>
<body id="page-pvp" style="background: #0f1115; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. PK匹配大厅 (PK) 弹窗 -->
  <div class="modal-overlay" id="modal-pk">
    <div class="modal-card modal-large">
      <button class="modal-close" data-close="modal-pk">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">⚔️</span>
        <h2>1v1 虚空擂台 · PK匹配</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 24px; display: flex; gap: 24px; flex-wrap: wrap;">
        <div class="pk-profile" style="flex: 1; min-width: 250px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <div class="pk-rank-card" style="margin-bottom: 16px;">
            <div class="pk-badge" id="pk-rank-badge" style="font-size: 1.3rem; font-weight: bold; color: #ffca28; margin-bottom: 6px;">🏆 黄金战神</div>
            <div class="pk-points" style="font-size: 1rem; color: var(--text-muted);">积分: <strong id="pk-points-val" style="color: #fff; font-size: 1.4rem;">1000</strong></div>
          </div>
          <div class="pk-stats-grid" style="display: flex; gap: 16px; width: 100%;">
            <div class="stat-box" style="flex: 1; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px;">
              <span class="label" style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px;">胜率</span>
              <span class="value" id="pk-win-rate" style="font-size: 1.1rem; font-weight: bold;">0%</span>
            </div>
            <div class="stat-box" style="flex: 1; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px;">
              <span class="label" style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px;">总场次</span>
              <span class="value" id="pk-total-battles" style="font-size: 1.1rem; font-weight: bold;">0</span>
            </div>
          </div>
        </div>
        <div class="pk-actions" style="flex: 1.5; min-width: 280px; display: flex; flex-direction: column; gap: 16px;">
          <button class="pk-btn-match" id="btn-pk-match" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); border: none; color: white; padding: 18px; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(231,76,60,0.3); transition: all 0.3s; width: 100%;">
            <div class="match-icon" style="font-size: 1.4rem;">📡</div>
            <span>自动寻找对手</span>
          </button>
          
          <div class="room-lobby" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 16px; border-radius: 16px; width: 100%;">
            <div class="room-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <h4 style="font-size: 0.95rem; font-weight: bold;">当前在线房间</h4>
              <button class="hud-btn" id="btn-create-room" style="padding: 6px 12px; font-size: 0.8rem; background: var(--glass-bg);">创建房间</button>
            </div>
            <div class="room-list scrollable" id="room-list" style="height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
              <!-- 动态载入房间 -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 匹配雷达遮罩层 -->
  <div class="radar-overlay" id="radar-overlay" style="display: none; position: fixed; inset: 0; z-index: 250; background: rgba(15,17,21,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); align-items: center; justify-content: center; color: white; text-align: center;">
    <div class="radar-card" style="display: flex; flex-direction: column; align-items: center;">
      <div class="radar-circle" style="position: relative; width: 120px; height: 120px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
        <div class="radar-sweep" style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, rgba(231,76,60,0.4) 0deg, transparent 90deg); animation: rotate 2s linear infinite;"></div>
        <div class="radar-ping" style="font-size: 2.2rem;">📡</div>
      </div>
      <h3 style="font-size: 1.2rem; font-weight: bold; margin-bottom: 8px;">正在匹配对手中...</h3>
      <p style="font-size: 0.85rem; color: var(--text-muted);">已用时间: <span id="radar-timer">0</span> 秒</p>
      <button class="hud-btn" id="btn-cancel-match" style="margin-top: 24px; padding: 10px 24px; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15);">取消匹配</button>
    </div>
  </div>

  <!-- PK 对决血条 HUD -->
  <div class="pk-hud" id="pk-hud" style="display: none;">
    <div class="pk-hud-player">
      <div class="pk-hud-name" id="pk-hud-p1-name">您自己</div>
      <div class="pk-hud-hp-bar">
        <div class="pk-hud-hp-fill" id="pk-hud-p1-hp" style="width: 100%;"></div>
      </div>
      <div class="pk-hud-hp-text" id="pk-hud-p1-hp-text">100 / 100</div>
    </div>
    <div class="pk-hud-vs">VS</div>
    <div class="pk-hud-player">
      <div class="pk-hud-name" id="pk-hud-p2-name">机器人挑战者</div>
      <div class="pk-hud-hp-bar">
        <div class="pk-hud-hp-fill" id="pk-hud-p2-hp" style="width: 100%;"></div>
      </div>
      <div class="pk-hud-hp-text" id="pk-hud-p2-hp-text">100 / 100</div>
    </div>
  </div>

  <!-- PK 战斗调试面板 -->
  <div id="pk-debug-info" style="display: none;"></div>

  <!-- 2. 排行榜 (Leaderboard) 弹窗 (公共) -->
  

  <!-- 6. 每日任务 (Tasks) 弹窗 (公共) -->
  

  <!-- 2D世界地图 (World Map) 弹窗 -->
  

  <!-- 4. 我的背包 (Backpack) 弹窗 (公共) -->
  

  <!-- 5. 市集商店 (Shop) 弹窗 (公共) -->
  

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./src/ui/app-shell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
