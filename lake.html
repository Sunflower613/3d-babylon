<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>云顶天池 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body id="page-lake" style="background: #090b0e; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 钢琴弹奏 (Piano) 弹窗 -->
  <div class="modal-overlay" id="modal-piano">
    <div class="modal-card modal-game" style="max-width: 650px; background: rgba(15, 23, 42, 0.65); border: 1px solid rgba(255, 255, 255, 0.08);">
      <button class="modal-close" data-close="modal-piano">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🎹</span>
        <h2>云顶天琴 · 湖畔心曲</h2>
      </div>
      <div class="modal-body" style="padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; overflow: hidden;">
        <p class="description" style="color: rgba(255,255,255,0.7); font-size: 0.85rem; text-align: center; margin: 0 0 10px 0;">
          在云顶弹奏一段舒缓的旋律。支持键盘按键 <strong style="color: #ffd700;">A S D F G H J K</strong> 弹奏 8 个自然音符。
        </p>
        
        <!-- 钢琴琴键区域 -->
        <div class="piano-keyboard-container" style="display: flex; gap: 4px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); position: relative; width: 100%; max-width: 520px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);">
          <!-- 8个白键 -->
          <div class="piano-key white-key" data-note="C4" data-key="A">
            <span class="key-note">Do</span>
            <span class="key-bind">A</span>
          </div>
          <div class="piano-key white-key" data-note="D4" data-key="S">
            <span class="key-note">Re</span>
            <span class="key-bind">S</span>
          </div>
          <div class="piano-key white-key" data-note="E4" data-key="D">
            <span class="key-note">Mi</span>
            <span class="key-bind">D</span>
          </div>
          <div class="piano-key white-key" data-note="F4" data-key="F">
            <span class="key-note">Fa</span>
            <span class="key-bind">F</span>
          </div>
          <div class="piano-key white-key" data-note="G4" data-key="G">
            <span class="key-note">Sol</span>
            <span class="key-bind">G</span>
          </div>
          <div class="piano-key white-key" data-note="A4" data-key="H">
            <span class="key-note">La</span>
            <span class="key-bind">H</span>
          </div>
          <div class="piano-key white-key" data-note="B4" data-key="J">
            <span class="key-note">Si</span>
            <span class="key-bind">J</span>
          </div>
          <div class="piano-key white-key" data-note="C5" data-key="K">
            <span class="key-note">Do⁺</span>
            <span class="key-bind">K</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 2. 关于我 (About Me) 弹窗 -->
  

  <!-- 3. 技术栈 (Skills) 弹窗 -->
  

  <!-- 4. 项目展示 (Projects) 弹窗 -->
  

  <!-- 5. 复古街机 21点游戏 (Arcade) 弹窗 -->
  <div class="modal-overlay" id="modal-arcade">
    <div class="modal-card modal-game">
      <button class="modal-close" id="btn-close-arcade" data-close="modal-arcade">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🕹️</span>
        <h2 id="arcade-title">复古街机 · 游戏大厅</h2>
      </div>
      <div class="modal-body no-padding"></div>
    </div>
  </div>

  <!-- 6. 排行榜 (Leaderboard) 弹窗 (公共) -->
  

  <!-- 7. 每日任务 (Tasks) 弹窗 (公共) -->
  

  <!-- 8. 2D世界地图 (World Map) 弹窗 -->
  

  <!-- 9. 我的背包 (Backpack) 弹窗 (公共) -->
  

  <!-- 10. 市集商店 (Shop) 弹窗 (公共) -->
  

  <!-- 11. 退出确认 (Exit Confirm) 弹窗 -->
  <div class="modal-overlay" id="modal-exit">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-exit">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🚪</span>
        <h2>传送确认</h2>
      </div>
      <div class="modal-body" style="padding: 24px; text-align: center;">
        <p style="color: #fff; font-size: 1rem; margin-bottom: 24px;">你确定要离开天池，传送回海岛大厅吗？</p>
        <div style="display: flex; justify-content: center; gap: 16px;">
          <button class="hud-btn" id="btn-exit-confirm" style="background: linear-gradient(135deg, #e53935, #c62828); border: none;">确定</button>
          <button class="hud-btn" data-close="modal-exit" style="background: rgba(255,255,255,0.1);">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- -------------------- 常驻 HUD & 交互面板 -------------------- -->

  <!-- 退出坐下状态 (Exit Sitting) HUD -->
  <div id="exit-sitting-hud" class="sitting-hud" style="display: none;">
    <div class="sitting-hud-content">
      <span>🧘 您已坐下，静赏瓷碗唱歌</span>
      <button id="btn-exit-sitting" class="hud-btn">起身离开</button>
    </div>
  </div>

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./src/ui/app-shell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
