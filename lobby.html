<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>大厅群岛 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  
</head>
<body id="page-lobby" style="background: #0f1115; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 关于我 (About Me) 弹窗 -->
  

  <!-- 2. 技术栈 (Skills) 弹窗 -->
  

  <!-- 3. 项目展示 (Projects) 弹窗 -->
  

  <!-- 4. 复古街机 21点游戏 (Arcade) 弹窗 -->
  <div class="modal-overlay" id="modal-arcade">
    <div class="modal-card modal-game">
      <button class="modal-close" id="btn-close-arcade" data-close="modal-arcade">&times;</button>
      <div class="modal-header" style="justify-content: flex-start;">
        <span class="modal-emoji">🕹️</span>
        <h2 id="arcade-title">复古街机 · 游戏大厅</h2>
        <button id="btn-arcade-back" class="hud-btn" style="display: none; margin-left: 20px; padding: 6px 14px; font-size: 0.8rem;">返回大厅</button>
      </div>
      <div class="modal-body no-padding" style="display: flex; flex-direction: column; overflow: hidden;">
        <!-- 游戏列表大厅 (Grid) -->
        <div id="arcade-lobby" class="scrollable" style="padding: 30px; overflow-y: auto; flex-grow: 1; width: 100%;">
          <div class="arcade-games-grid">
            <!-- Dynamic list generated by script -->
          </div>
        </div>
        <!-- 动态加载游戏的 iframe -->
        <iframe id="arcade-iframe" src="" frameborder="0" width="100%" height="100%" style="display: none; flex-grow: 1;"></iframe>
      </div>
    </div>
  </div>

  <!-- 5. 排行榜 (Leaderboard) 弹窗 (公共) -->
  

  <!-- 6. 每日任务 (Tasks) 弹窗 (公共) -->
  

  <!-- 2D世界地图 (World Map) 弹窗 -->
  

  <!-- 7. 我的背包 (Backpack) 弹窗 (公共) -->
  

  <!-- 5. 市集商店 (Shop) 弹窗 (公共) -->
  

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./src/ui/app-shell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
