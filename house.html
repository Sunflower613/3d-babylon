<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>温馨小屋 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  
</head>
<body id="page-house" style="background: #0f1115; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 调色盘画架 (Easel) 弹窗 -->
  <div class="modal-overlay" id="modal-easel">
    <div class="modal-card modal-game">
      <button class="modal-close" data-close="modal-easel">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🎨</span>
        <h2>画架 · 调色盘</h2>
      </div>
      <div class="modal-body no-padding" style="display: flex; flex-direction: column; overflow: hidden; flex-grow: 1; height: 100%;">
        <iframe id="easel-iframe" src="" frameborder="0" width="100%" height="100%" style="flex-grow: 1; border-radius: 0 0 28px 28px; background: #fff;"></iframe>
      </div>
    </div>
  </div>

  <!-- 2. 衣柜换装 (Wardrobe) 弹窗 -->
  <div class="modal-overlay" id="modal-wardrobe">
    <div class="wardrobe-container">
      <!-- Left Sidebar: Model Selection -->
      <div class="wardrobe-sidebar left">
        <div class="sidebar-header">
          <span class="modal-emoji">👤</span>
          <h2>选择角色</h2>
        </div>
        <div class="sidebar-body">
          <p class="description" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px;">在下方选择你喜欢的 3D 模型造型：</p>
          <div class="model-options">
            <button class="model-btn active" data-model="girl">
              <span class="model-icon">👧</span>
              <div class="model-info">
                <span class="model-name">海滨小女孩</span>
                <span class="model-desc" style="display: block; font-size: 0.72rem; color: var(--text-muted);">经典双马尾，清新可爱</span>
              </div>
            </button>
            <button class="model-btn" data-model="boy">
              <span class="model-icon">👦</span>
              <div class="model-info">
                <span class="model-name">海滨小男孩</span>
                <span class="model-desc" style="display: block; font-size: 0.72rem; color: var(--text-muted);">酷炫棒球帽，海滩活力</span>
              </div>
            </button>
            <button class="model-btn" data-model="kitty">
              <span class="model-icon">🐱</span>
              <div class="model-info">
                <span class="model-name">神秘小猫咪</span>
                <span class="model-desc" style="display: block; font-size: 0.72rem; color: var(--text-muted);">萌耳灵动尾，黄金铃铛</span>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Right Sidebar: Color Customization -->
      <div class="wardrobe-sidebar right">
        <button class="modal-close" data-close="modal-wardrobe">&times;</button>
        <div class="sidebar-header">
          <span class="modal-emoji">🎨</span>
          <h2>定制色彩</h2>
        </div>
        <div class="sidebar-body scrollable">
          <p class="description" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px;">在此搭配你喜欢的色彩：</p>
          
          <!-- Hair Color -->
          <div class="wardrobe-section">
            <h3 id="wardrobe-hair-title" style="font-size: 1rem; color: #fff; margin-bottom: 12px; border-left: 3px solid var(--primary); padding-left: 8px; font-weight: 700;">发色 / 毛色</h3>
            <div class="color-options" id="wardrobe-hair" style="display: flex; gap: 12px; flex-wrap: wrap;">
              <button class="color-btn active" style="background-color: #ff4081;" data-color="0xff4081"></button>
              <button class="color-btn" style="background-color: #ffb74d;" data-color="0xffb74d"></button>
              <button class="color-btn" style="background-color: #4fc3f7;" data-color="0x4fc3f7"></button>
              <button class="color-btn" style="background-color: #81c784;" data-color="0x81c784"></button>
              <button class="color-btn" style="background-color: #ba68c8;" data-color="0xba68c8"></button>
              <button class="color-btn" style="background-color: #e0f7fa;" data-color="0xe0f7fa"></button>
            </div>
          </div>
          
          <!-- Clothing Color -->
          <div class="wardrobe-section" style="margin-top: 24px;">
            <h3 id="wardrobe-clothing-title" style="font-size: 1rem; color: #fff; margin-bottom: 12px; border-left: 3px solid var(--secondary); padding-left: 8px; font-weight: 700;">服装颜色</h3>
            <div class="color-options" id="wardrobe-clothes" style="display: flex; gap: 12px; flex-wrap: wrap;">
              <button class="color-btn" style="background-color: #ffffff;" data-color="0xffffff"></button>
              <button class="color-btn" style="background-color: #ff5252;" data-color="0xff5252"></button>
              <button class="color-btn active" style="background-color: #4fc3f7;" data-color="0x4fc3f7"></button>
              <button class="color-btn" style="background-color: #2e7d32;" data-color="0x2e7d32"></button>
              <button class="color-btn" style="background-color: #ffeb3b;" data-color="0xffeb3b"></button>
              <button class="color-btn" style="background-color: #263238;" data-color="0x263238"></button>
            </div>
          </div>

          <!-- Hat / Accessory Color -->
          <div class="wardrobe-section" style="margin-top: 24px;">
            <h3 id="wardrobe-hat-title" style="font-size: 1rem; color: #fff; margin-bottom: 12px; border-left: 3px solid #ffca28; padding-left: 8px; font-weight: 700;">配饰 / 铃铛颜色</h3>
            <div class="color-options" id="wardrobe-hat" style="display: flex; gap: 12px; flex-wrap: wrap;">
              <button class="color-btn active" style="background-color: #fff9c4;" data-color="0xfff9c4"></button>
              <button class="color-btn" style="background-color: #d50000;" data-color="0xd50000"></button>
              <button class="color-btn" style="background-color: #ff80ab;" data-color="0xff80ab"></button>
              <button class="color-btn" style="background-color: #a1887f;" data-color="0xa1887f"></button>
              <button class="color-btn" style="background-color: #cfd8dc;" data-color="0xcfd8dc"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. 我的家园 (Home Build) 弹窗 -->
  <div class="modal-overlay" id="modal-home">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-home">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🏠</span>
        <h2>匠心营建 · 家具工坊</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 20px;">
        <div style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
          <span>💰 当前金币: <strong id="home-coins" style="color: #ffd700;">0</strong></span>
          <button class="hud-btn" id="btn-enter-edit-mode" style="background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); border: none; font-size: 0.85rem; padding: 8px 14px; box-shadow: 0 5px 10px rgba(76,175,80,0.3);">编辑模式 🛠️</button>
        </div>
        <div class="furniture-shop-grid" id="furniture-shop-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
          <!-- 家具商品 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 排行榜 (Leaderboard) 弹窗 (公共) -->
  

  <!-- 5. 每日任务 (Tasks) 弹窗 (公共) -->
  

  <!-- 2D世界地图 (World Map) 弹窗 -->
  

  <!-- 6. 我的背包 (Backpack) 弹窗 (公共) -->
  

  <!-- 5. 市集商店 (Shop) 弹窗 (公共) -->
  

  <!-- 家园编辑模式 HUD -->
  <div class="home-edit-hud" id="home-edit-hud" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300; background: rgba(15,17,21,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 14px 24px; box-shadow: 0 20px 45px rgba(0,0,0,0.5); flex-direction: column; align-items: center; gap: 8px; width: 90%; max-width: 450px;">
    <div class="edit-hud-title" style="font-size: 0.95rem; font-weight: bold; color: #4fc3f7; display: flex; align-items: center; gap: 6px;">🛠️ 家园编辑模式</div>
    <div class="edit-hud-tips" style="font-size: 0.72rem; color: var(--text-muted); text-align: center; line-height: 1.3;">
      <span>拖动屏幕定位全息家具，点击 [旋转] 调整朝向。按 [保存] 完成摆放。</span>
    </div>
    <div class="edit-hud-actions" style="display: flex; gap: 10px; width: 100%; justify-content: center; margin-top: 4px;">
      <button class="hud-btn" id="btn-edit-rotate" style="flex: 1; padding: 6px 10px; font-size: 0.8rem; background: var(--glass-bg);">旋转 (R)</button>
      <button class="hud-btn" id="btn-edit-cancel" style="flex: 1; padding: 6px 10px; font-size: 0.8rem; background: rgba(255, 82, 82, 0.15); border-color: rgba(255, 82, 82, 0.3); color: #ff8a80;">取消</button>
      <button class="hud-btn" id="btn-edit-save" style="flex: 1; padding: 6px 10px; font-size: 0.8rem; background: rgba(76, 175, 80, 0.2); border-color: rgba(76, 175, 80, 0.4); color: #b9f6ca; font-weight: bold;">保存 💾</button>
    </div>
  </div>

  <!-- Bed HUD Panel -->
  <div class="bed-hud" id="bed-hud" style="display: none;">
    <button id="btn-toggle-time" class="hud-btn">切换时间 🌓</button>
    <button id="btn-stand-up" class="hud-btn">起身 🏃</button>
  </div>

  <!-- 出门传送点目的地选择弹窗 -->
  <div class="modal-overlay" id="modal-exit">
    <div class="modal-card" style="max-width: 380px;">
      <button class="modal-close" data-close="modal-exit">&times;</button>
      <div class="modal-header" style="justify-content: center; margin-bottom: 16px;">
        <span class="modal-emoji">🚪</span>
        <h2>请选择出门目的地</h2>
      </div>
      <div class="modal-body" style="display: flex; flex-direction: column; gap: 14px; padding: 10px 0;">
        <button class="hud-btn exit-choice-btn" data-target="island" style="padding: 14px; font-size: 0.95rem; font-weight: bold; background: linear-gradient(135deg, rgba(79, 195, 247, 0.2) 0%, rgba(2, 136, 209, 0.4) 100%); border-color: rgba(2, 136, 209, 0.5); color: #fff; cursor: pointer;">
          🏝️ 治愈海岛
        </button>
        <button class="hud-btn exit-choice-btn" data-target="farm" style="padding: 14px; font-size: 0.95rem; font-weight: bold; background: linear-gradient(135deg, rgba(129, 199, 132, 0.2) 0%, rgba(56, 142, 60, 0.4) 100%); border-color: rgba(56, 142, 60, 0.5); color: #fff; cursor: pointer;">
          🌾 我的农田
        </button>
        <button class="hud-btn exit-choice-btn" data-target="pk" style="padding: 14px; font-size: 0.95rem; font-weight: bold; background: linear-gradient(135deg, rgba(229, 115, 115, 0.2) 0%, rgba(211, 47, 47, 0.4) 100%); border-color: rgba(211, 47, 47, 0.5); color: #fff; cursor: pointer;">
          ⚔️ 虚空擂台
        </button>
      </div>
    </div>
  </div>

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./src/ui/app-shell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
