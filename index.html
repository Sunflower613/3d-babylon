<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3D 治愈群岛 | 个人主页小游戏</title>
  <meta name="description" content="欢迎来到我的 3D 治愈群岛个人主页。在这里，你可以控制小角色在浮空岛屿间游览，探索我的项目、技能以及游玩经典的21点街机游戏！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body style="background: #0f1115; overflow: hidden; margin: 0; width: 100%; height: 100%;">
  
  <!-- 3D 游戏子视口 iframe (同源，用于地图多页面加载) -->
  <iframe id="game-frame" src="./lobby.html" style="width: 100%; height: 100%; border: none; background: #0f1115; position: absolute; top: 0; left: 0; z-index: 1;"></iframe>

  <!-- ==================== 外层常驻 HUD 与控制面板 (z-index 提到最前，且 pointer-events 为 none 防止阻挡视角旋转) ==================== -->
  
  <div style="position: absolute; inset: 0; z-index: 10; pointer-events: none; width: 100%; height: 100%;">
    
    <header class="hud-header">
      <!-- SSO 统一登录/用户状态小部件 -->
      <div id="sso-profile-container" class="sso-profile-bar">
        <!-- 未登录：仅显示 person 图标 -->
        <button id="sso-login-btn" class="sso-login-btn" style="display: none;" title="打开侧边栏">
          <iconify-icon icon="lucide:user" style="font-size: 20px; display: flex;"></iconify-icon>
        </button>
        <!-- 已登录：显示头像，点击触发侧边栏 -->
        <button id="sso-user-info" class="sso-user-info" style="display: none; border: none; background: none; outline: none; padding: 0; cursor: pointer; width: 100%; height: 100%;" title="打开侧边栏">
          <div class="sso-avatar-wrapper" title="打开侧边栏">
            <img id="sso-avatar" class="sso-avatar" src="" alt="头像">
          </div>
        </button>
      </div>
    </header>

    <!-- 移动端虚拟摇杆与动作按钮 -->
    <div class="mobile-controls" id="mobile-controls">
      <div class="joystick-wrapper">
        <div id="joystick-zone"></div>
      </div>
      <div class="action-buttons">
        <button class="action-btn" id="btn-interact" style="display: none;" aria-label="交互" title="交互">
          <iconify-icon icon="lucide:sparkles" style="font-size: 22px; display: flex;"></iconify-icon>
        </button>
        <button class="action-btn" id="btn-pk-attack" style="display: none;" aria-label="攻击" title="攻击">
          <iconify-icon icon="lucide:swords" style="font-size: 24px; display: flex;"></iconify-icon>
        </button>
        <button class="action-btn" id="btn-run" aria-label="加速" title="加速">
          <iconify-icon icon="lucide:zap" style="font-size: 22px; display: flex;"></iconify-icon>
        </button>
        <button class="action-btn" id="btn-jump" aria-label="跳跃" title="跳跃">
          <iconify-icon icon="lucide:chevrons-up" style="font-size: 26px; display: flex;"></iconify-icon>
        </button>
      </div>
    </div>

    <!-- 侧边栏遮罩层 -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- 原神风格侧边栏 -->
    <div id="sso-sidebar" class="sso-sidebar">
      <!-- 左侧系统迷你侧边栏 (竖向) -->
      <div class="sidebar-aside">
        <!-- 音量开关 -->
        <button id="sidebar-audio-btn" class="aside-btn" title="背景音乐">
          <iconify-icon id="sidebar-audio-icon" icon="lucide:volume-x" style="font-size: 20px; display: flex;"></iconify-icon>
        </button>
        <!-- 脱离卡死 -->
        <button id="sidebar-stuck-btn" class="aside-btn" title="脱离卡死">
          <iconify-icon icon="lucide:life-buoy" style="font-size: 20px; display: flex;"></iconify-icon>
        </button>
        <div style="flex: 1;"></div>
        <!-- 返回 2D 主页 -->
        <button id="sidebar-back-2d-btn" class="aside-btn" title="返回2D主页">
          <iconify-icon icon="lucide:undo-2" style="font-size: 20px; display: flex;"></iconify-icon>
        </button>
        <!-- 退出登录 -->
        <button id="sidebar-logout-btn" class="aside-btn" title="退出登录" style="display: none;">
          <iconify-icon icon="lucide:power" style="font-size: 20px; display: flex;"></iconify-icon>
        </button>
      </div>

      <!-- 右侧内容面板 -->
      <div class="sidebar-main">
        <button class="sidebar-close" id="sidebar-close-btn">&times;</button>
        
        <div class="sidebar-user-section">
          <img id="sidebar-avatar" class="sidebar-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Ccircle cx='12' cy='8' r='4'/%3E%3Cpath d='M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z'/%3E%3C/svg%3E" alt="头像">
          <div class="sidebar-user-meta">
            <div class="user-meta-top">
              <h3 id="sidebar-username">未登录</h3>
              <button id="sidebar-login-btn" class="sso-inline-login-btn">立即登录</button>
            </div>
            <span id="sidebar-user-status" class="status-badge">游客</span>
          </div>
        </div>
        
        <div class="sidebar-content scrollable">
          <!-- 1. 地图选择 -->
          <div class="sidebar-item expandable" id="sidebar-map-btn" title="地图选择">
            <div class="sidebar-item-icon">
              <iconify-icon icon="lucide:map" style="font-size: 24px; display: flex;"></iconify-icon>
            </div>
            <span>地图选择</span>
            <div class="sidebar-submenu" id="sidebar-map-submenu">
              <div class="submenu-option" id="btn-map-island">治愈群岛</div>
              <div class="submenu-option" id="btn-map-house">温馨小屋</div>
            </div>
          </div>

          <div class="sidebar-grid">
            <!-- 2. 排行榜 -->
            <button class="sidebar-item" id="btn-sidebar-leaderboard" title="排行榜">
              <iconify-icon icon="lucide:trophy" style="font-size: 20px; display: flex;"></iconify-icon>
              <span>排行榜</span>
            </button>

            <!-- 3. 游戏任务 -->
            <button class="sidebar-item" id="btn-sidebar-tasks" title="游戏任务">
              <iconify-icon icon="lucide:clipboard-list" style="font-size: 20px; display: flex;"></iconify-icon>
              <span>游戏任务</span>
            </button>

            <!-- 4. 我的农田 -->
            <button class="sidebar-item" id="btn-sidebar-farm" title="我的农田">
              <iconify-icon icon="lucide:sprout" style="font-size: 20px; display: flex;"></iconify-icon>
              <span>我的农田</span>
            </button>

            <!-- 5. PK大厅 -->
            <button class="sidebar-item" id="btn-sidebar-pk" title="PK大厅">
              <iconify-icon icon="lucide:swords" style="font-size: 20px; display: flex;"></iconify-icon>
              <span>PK大厅</span>
            </button>

            <!-- 6. 我的背包 -->
            <button class="sidebar-item" id="btn-sidebar-bag" title="我的背包">
              <iconify-icon icon="lucide:briefcase" style="font-size: 20px; display: flex;"></iconify-icon>
              <span>我的背包</span>
            </button>

            <!-- 7. 我的家园 -->
            <button class="sidebar-item" id="btn-sidebar-home" title="我的家园">
              <iconify-icon icon="lucide:home" style="font-size: 20px; display: flex;"></iconify-icon>
              <span>我的家园</span>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- 引入外壳常驻脚本 -->
  <script type="module" src="./src/ui/app-shell.js"></script>

  <!-- 禁用移动端边缘滑动返回/前进手势 -->
  <script>
    document.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches.length > 0) {
        const x = e.touches[0].clientX;
        if (x < 40 || x > window.innerWidth - 40) {
          e.currentTarget.preventSwipeNavigation = true;
        } else {
          e.currentTarget.preventSwipeNavigation = false;
        }
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.currentTarget.preventSwipeNavigation) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</body>
</html>
