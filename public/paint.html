<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术画室 · 3D 调色盘写生</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8c69;
            --primary-glow: rgba(255, 140, 105, 0.4);
            --secondary: #64b5f6;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: radial-gradient(circle at top, #1a1e29, #0f1115);
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans SC', system-ui, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .paint-container {
            width: 100%;
            max-width: 680px;
            background: rgba(15, 17, 21, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
        }

        /* Target Matching Header */
        .target-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 16px;
        }

        .target-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .target-color-box {
            width: 70px;
            height: 38px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }

        .target-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .btn-action {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-action:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        /* Canvas Board */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #ffffff;
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
            height: auto;
        }

        /* Color Palette and Paint Pots */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .palette-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .color-pot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .color-pot:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .color-pot.active {
            transform: scale(1.15);
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* Tool buttons */
        .tools-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 14px;
        }

        .left-tools, .right-tools {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .brush-size-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .brush-size-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .now-color-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .color-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1.5px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Alert Overlay */
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 11, 14, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .alert-card {
            background: rgba(20, 24, 33, 0.9);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 30px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
        }

        .alert-card.show {
            transform: scale(1);
        }

        .alert-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #fff;
        }

        .alert-similarity {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .alert-message {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Responsive Landscape Mobile layout (Side-by-Side layout via CSS Grid) */
        @media (max-height: 520px) {
            body {
                padding: 6px;
            }
            .paint-container {
                display: grid;
                grid-template-columns: 1.25fr 1fr;
                grid-template-rows: auto 1fr;
                grid-template-areas: 
                    "canvas header"
                    "canvas controls";
                gap: 8px;
                padding: 10px;
                max-width: 100%;
                width: 100%;
                height: 100%;
                border-radius: 16px;
            }
            .canvas-wrapper {
                grid-area: canvas;
                height: 100%;
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 12px;
            }
            canvas {
                width: 100% !important;
                height: 100% !important;
                max-height: 80vh;
                object-fit: contain;
                border-radius: 8px;
            }
            .target-header {
                grid-area: header;
                padding: 6px 12px;
                border-radius: 10px;
                gap: 8px;
            }
            .control-panel {
                grid-area: controls;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                height: 100%;
                gap: 8px;
            }
            .palette-section {
                gap: 4px;
                justify-content: flex-start;
            }
            .color-pot {
                width: 32px;
                height: 32px;
                font-size: 0.65rem;
                border-width: 1.5px;
            }
            .color-pot.active {
                transform: scale(1.1);
            }
            .target-color-box {
                width: 44px;
                height: 26px;
            }
            .target-text {
                font-size: 0.7rem;
                line-height: 1.2;
            }
            .btn-action {
                padding: 4px 10px;
                font-size: 0.72rem;
            }
            .tools-section {
                padding-top: 6px;
                gap: 6px;
            }
            .brush-size-btn {
                width: 24px;
                height: 24px;
                font-size: 0.65rem;
            }
            .color-circle {
                width: 16px;
                height: 16px;
            }
            .now-color-preview {
                font-size: 0.72rem;
            }
            .left-tools, .right-tools {
                gap: 6px;
            }
        }

        /* Responsive Portrait / Mobile Screen Width layout */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            .paint-container {
                padding: 12px;
                border-radius: 16px;
                gap: 12px;
            }
            .target-header {
                padding: 8px 12px;
                border-radius: 12px;
            }
            .color-pot {
                width: 38px;
                height: 38px;
            }
            .tools-section {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .right-tools {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

    <div class="paint-container">
        <!-- Target Color Header -->
        <div class="target-header">
            <div class="target-info">
                <div class="target-color-box" id="target-color"></div>
                <div class="target-text">写生目标色<br><span id="target-hex" style="font-size:0.75rem; color:rgba(255,255,255,0.4)">#ffffff</span></div>
            </div>
            <button class="btn-action" onclick="generateNewTarget()">换目标色</button>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-wrapper">
            <canvas id="canvas" width="640" height="340"></canvas>
        </div>

        <!-- Controls Section -->
        <div class="control-panel">
            <!-- Palette pots -->
            <div class="palette-section">
                <!-- Row 1: Base pigments -->
                <div class="color-pot active" onclick="chooseColor('rgb(255, 64, 129)')" style="background-color: rgb(255, 64, 129);">红</div>
                <div class="color-pot" onclick="chooseColor('rgb(255, 235, 59)')" style="background-color: rgb(255, 235, 59); color:#000; text-shadow:none;">黄</div>
                <div class="color-pot" onclick="chooseColor('rgb(33, 150, 243)')" style="background-color: rgb(33, 150, 243);">蓝</div>
                <div class="color-pot" onclick="chooseColor('rgb(76, 175, 80)')" style="background-color: rgb(76, 175, 80);">绿</div>
                <div class="color-pot" onclick="chooseColor('rgb(255, 255, 255)')" style="background-color: rgb(255, 255, 255); color:#000; text-shadow:none;">白</div>
                <div class="color-pot" onclick="chooseColor('rgb(17, 17, 17)')" style="background-color: rgb(17, 17, 17);">黑</div>
                
                <!-- Row 2: Secondary / blended pigments -->
                <div class="color-pot" onclick="chooseColor('rgb(156, 39, 176)')" style="background-color: rgb(156, 39, 176);">紫</div>
                <div class="color-pot" onclick="chooseColor('rgb(255, 152, 0)')" style="background-color: rgb(255, 152, 0);">橙</div>
                <div class="color-pot" onclick="chooseColor('rgb(0, 188, 212)')" style="background-color: rgb(0, 188, 212);">青</div>
                <div class="color-pot" onclick="chooseColor('rgb(121, 85, 72)')" style="background-color: rgb(121, 85, 72);">褐</div>
                
                <!-- Special blend actions -->
                <div class="color-pot" onclick="waterBlend()" style="background-color: rgb(224, 247, 250); color:#0097a7; text-shadow:none;" title="加清水稀释调和">水</div>
                <button class="color-pot" id="btn-mix" onclick="mixColors()" style="background: linear-gradient(135deg, #ff4081, #9c27b0); border:none;" title="将当前颜色与上一步 the color 混合">融合</button>
            </div>

            <!-- Toolbar -->
            <div class="tools-section">
                <div class="left-tools">
                    <button class="btn-action" onclick="undo()" style="padding: 8px 12px;">撤销</button>
                    <button class="btn-action" onclick="clearCanvas()" style="background:rgba(255,82,82,0.15); border-color:rgba(255,82,82,0.3); color:#ff5252; padding: 8px 12px;">清空</button>
                    
                    <div style="display:flex; gap:6px; align-items:center; margin-left:8px;">
                        <button class="brush-size-btn" onclick="setBrushSize(8, this)">小</button>
                        <button class="brush-size-btn active" onclick="setBrushSize(18, this)">中</button>
                        <button class="brush-size-btn" onclick="setBrushSize(28, this)">大</button>
                    </div>
                </div>

                <div class="right-tools">
                    <div class="now-color-preview">
                        当前色:
                        <div class="color-circle" id="now-color-circle" style="background-color: rgb(255, 64, 129);"></div>
                    </div>
                    <button class="btn-action" onclick="submitPaint()" style="background:#4caf50; border-color:#4caf50; padding: 8px 20px;">完成比对</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Modal Dialog -->
    <div class="alert-overlay" id="alert-overlay">
        <div class="alert-card" id="alert-card">
            <div class="alert-title">写生色彩比对</div>
            <div class="alert-similarity" id="alert-similarity">0%</div>
            <div class="alert-message" id="alert-message">你调制的色彩与目标色彩很接近！</div>
            <button class="btn-action" onclick="closeAlert()" style="background:var(--secondary); border-color:var(--secondary); width:100%;">继续写生</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let currentColor = 'rgb(255, 64, 129)';
        let previousColor = 'rgb(255, 255, 255)';
        let targetColor = 'rgb(255, 255, 255)';
        let isDrawing = false;
        let brushRadius = 18;

        // Undo History Stack
        const historyStack = [];
        const maxHistory = 15;

        // Set up canvas default (fill with white)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Generate initial target color
        generateNewTarget();
        updateColorsHud();

        // Canvas event listeners
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            saveHistory();
            paintAt(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                paintAt(e.clientX, e.clientY);
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            saveHistory();
            const touch = e.touches[0];
            paintAt(touch.clientX, touch.clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDrawing) {
                const touch = e.touches[0];
                paintAt(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        function paintAt(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(((clientX - rect.left) / rect.width) * canvas.width);
            const y = Math.round(((clientY - rect.top) / rect.height) * canvas.height);

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                // Get existing color under brush to mix
                const imgData = ctx.getImageData(x, y, 1, 1);
                const r = imgData.data[0];
                const g = imgData.data[1];
                const b = imgData.data[2];
                const a = imgData.data[3];
                
                // If transparent, treat as white
                const existingColor = a === 0 ? 'rgb(255, 255, 255)' : `rgb(${r}, ${g}, ${b})`;
                
                // Perform color mix
                const mixed = mix(currentColor, existingColor);
                
                // Update currentColor to mixed for continuous wet blend feel
                currentColor = mixed;

                // Draw brush circle
                ctx.fillStyle = currentColor;
                ctx.beginPath();
                ctx.arc(x, y, brushRadius, 0, Math.PI * 2);
                ctx.fill();

                updateColorsHud();
            }
        }

        function chooseColor(color) {
            previousColor = currentColor;
            currentColor = color;
            updateColorsHud();

            // Set active class on color pots
            document.querySelectorAll('.color-pot').forEach(pot => {
                if (pot.style.backgroundColor === color) {
                    pot.classList.add('active');
                } else {
                    pot.classList.remove('active');
                }
            });
        }

        function updateColorsHud() {
            document.getElementById('now-color-circle').style.backgroundColor = currentColor;
        }

        // Wet blend: 75% brush color, 25% canvas color for painting feel
        function mix(color1, color2) {
            const rgb1 = parseRgb(color1);
            const rgb2 = parseRgb(color2);

            const r = Math.round(rgb1.r * 0.75 + rgb2.r * 0.25);
            const g = Math.round(rgb1.g * 0.75 + rgb2.g * 0.25);
            const b = Math.round(rgb1.b * 0.75 + rgb2.b * 0.25);

            return `rgb(${r}, ${g}, ${b})`;
        }

        // Palette blend: 50% / 50% mix of current and previous colors
        function mixColors() {
            const rgb1 = parseRgb(currentColor);
            const rgb2 = parseRgb(previousColor);

            const r = Math.round((rgb1.r + rgb2.r) / 2);
            const g = Math.round((rgb1.g + rgb2.g) / 2);
            const b = Math.round((rgb1.b + rgb2.b) / 2);

            saveHistory();
            currentColor = `rgb(${r}, ${g}, ${b})`;
            updateColorsHud();

            // Flash active mix button feedback
            const btn = document.getElementById('btn-mix');
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => btn.style.transform = 'scale(1)', 150);
        }

        // Clear water dilutes the brush: blend currentColor with white (50% water dilution)
        function waterBlend() {
            chooseColor(mix(currentColor, 'rgb(255, 255, 255)'));
        }

        function parseRgb(colorStr) {
            const matches = colorStr.match(/\d+/g);
            if (!matches) return { r: 255, g: 255, b: 255 };
            return {
                r: parseInt(matches[0]),
                g: parseInt(matches[1]),
                b: parseInt(matches[2])
            };
        }

        function generateNewTarget() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            targetColor = `rgb(${r}, ${g}, ${b})`;
            
            document.getElementById('target-color').style.backgroundColor = targetColor;
            
            // Hex text
            const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            document.getElementById('target-hex').textContent = hex;
        }

        function saveHistory() {
            if (historyStack.length >= maxHistory) {
                historyStack.shift();
            }
            historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (historyStack.length > 0) {
                const imgData = historyStack.pop();
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function clearCanvas() {
            saveHistory();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function setBrushSize(radius, button) {
            brushRadius = radius;
            document.querySelectorAll('.brush-size-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            button.classList.add('active');
        }

        // Color comparison metric (average delta E distance)
        function submitPaint() {
            const userImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const targetRGB = parseRgb(targetColor);

            let totalDelta = 0;
            const stepVal = 4; // Sample every 4th pixel to save CPU
            let count = 0;

            for (let i = 0; i < userImg.data.length; i += 4 * stepVal) {
                const ur = userImg.data[i];
                const ug = userImg.data[i+1];
                const ub = userImg.data[i+2];

                // Euclidean distance in RGB color space
                const dr = ur - targetRGB.r;
                const dg = ug - targetRGB.g;
                const db = ub - targetRGB.b;
                const dist = Math.sqrt(dr*dr + dg*dg + db*db);

                totalDelta += dist;
                count++;
            }

            const avgDelta = totalDelta / count;
            const maxDist = Math.sqrt(255*255 + 255*255 + 255*255);
            const similarity = Math.max(0, Math.round((1 - (avgDelta / maxDist)) * 100));

            // Display customized feedback messages
            const simEl = document.getElementById('alert-similarity');
            const msgEl = document.getElementById('alert-message');
            
            simEl.textContent = `${similarity}%`;
            
            if (similarity >= 92) {
                msgEl.textContent = '神乎其技！色彩还原度极高，你简直是莫奈在世！';
            } else if (similarity >= 82) {
                msgEl.textContent = '绝妙的色彩调和！这幅写生非常接近目标色。';
            } else if (similarity >= 70) {
                msgEl.textContent = '调色感觉很好，细节再精进一点会更棒哦！';
            } else {
                msgEl.textContent = '色彩似乎有点偏离，再试一试，享受混色的乐趣！';
            }

            const overlay = document.getElementById('alert-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                document.getElementById('alert-card').classList.add('show');
            }, 10);
        }

        function closeAlert() {
            const card = document.getElementById('alert-card');
            card.classList.remove('show');
            setTimeout(() => {
                document.getElementById('alert-overlay').style.display = 'none';
            }, 300);
        }
    </script>
</body>
</html>
