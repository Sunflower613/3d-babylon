<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>我的农场 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  
</head>
<body id="page-farm" style="background: #0f1115; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 我的农田 (Farm) 弹窗 -->
  <div class="modal-overlay" id="modal-farm">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-farm">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🌱</span>
        <h2>浮空群岛 · 我的农地</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 20px;">
        <div class="farm-stats" style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 0.9rem; background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 10px;">
          <span>💰 当前金币: <strong id="farm-coins" style="color: #ffd700;">0</strong></span>
          <span>⭐ 农夫等级: <strong id="farm-level" style="color: #64b5f6;">1</strong> (EXP: <span id="farm-exp">0</span>/100)</span>
        </div>
        <div class="farm-grid" id="farm-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
          <!-- 2x3 农地格子 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 农田专用种植扇形菜单 (#radial-seed-menu) -->
  <div id="radial-seed-menu">
    <button class="radial-close-btn" id="btn-close-radial">&times;</button>
    <div class="radial-items">
      <button class="radial-item-btn" data-seed="sunflower_seed" id="radial-seed-sunflower">
        <span class="radial-icon">🌻</span>
        <span class="radial-count">0</span>
        <span class="radial-key-hint">1</span>
      </button>
      <button class="radial-item-btn" data-seed="strawberry_seed" id="radial-seed-strawberry">
        <span class="radial-icon">🍓</span>
        <span class="radial-count">0</span>
        <span class="radial-key-hint">2</span>
      </button>
    </div>
  </div>

  <!-- 2. 排行榜 (Leaderboard) 弹窗 (公共) -->
  

  <!-- 6. 每日任务 (Tasks) 弹窗 (公共) -->
  

  <!-- 2D世界地图 (World Map) 弹窗 -->
  

  <!-- 4. 我的背包 (Backpack) 弹窗 (公共) -->
  

  <!-- 5. 市集商店 (Shop) 弹窗 (公共) -->
  

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./src/ui/app-shell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
