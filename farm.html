<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>我的农场 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  
</head>
<body id="page-farm" style="background: #0f1115; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 我的农田 (Farm) 弹窗 -->
  <div class="modal-overlay" id="modal-farm">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-farm">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🌱</span>
        <h2>浮空群岛 · 我的农地</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 20px;">
        <div class="farm-stats" style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 0.9rem; background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 10px;">
          <span>💰 当前金币: <strong id="farm-coins" style="color: #ffd700;">0</strong></span>
          <span>⭐ 农夫等级: <strong id="farm-level" style="color: #64b5f6;">1</strong> (EXP: <span id="farm-exp">0</span>/100)</span>
        </div>
        <div class="farm-grid" id="farm-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
          <!-- 2x3 农地格子 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 农田专用种植扇形菜单 (#radial-seed-menu) -->
  <div id="radial-seed-menu">
    <button class="radial-close-btn" id="btn-close-radial">&times;</button>
    <div class="radial-items">
      <button class="radial-item-btn" data-seed="sunflower_seed" id="radial-seed-sunflower">
        <span class="radial-icon">🌻</span>
        <span class="radial-count">0</span>
        <span class="radial-key-hint">1</span>
      </button>
      <button class="radial-item-btn" data-seed="strawberry_seed" id="radial-seed-strawberry">
        <span class="radial-icon">🍓</span>
        <span class="radial-count">0</span>
        <span class="radial-key-hint">2</span>
      </button>
    </div>
  </div>

  <!-- 2. 排行榜 (Leaderboard) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-leaderboard">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-leaderboard">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🏆</span>
        <h2>个人大厅 · 排行榜</h2>
      </div>
      <div class="modal-body no-padding" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
        <div class="leaderboard-tabs">
          <button class="tab-btn active" data-tab="pkPoints">⚔️ 战力榜</button>
          <button class="tab-btn" data-tab="coins">💰 财富榜</button>
          <button class="tab-btn" data-tab="level">✨ 等级榜</button>
        </div>
        <div class="leaderboard-container scrollable" style="flex-grow: 1; padding: 20px; overflow-y: auto;">
          <div class="leaderboard-list-view" id="leaderboard-list-view">
            <!-- 动态生成排行 -->
          </div>
        </div>
        <div class="leaderboard-my-rank" id="leaderboard-my-rank">
          <!-- 当前用户排行 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 3. 每日任务 (Tasks) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-tasks">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-tasks">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">📋</span>
        <h2>治愈旅途 · 每日任务</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 20px;">
        <div class="tasks-list" id="tasks-list">
          <!-- 动态生成任务 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 2D世界地图 (World Map) 弹窗 -->
  <div class="modal-overlay" id="modal-map">
    <div class="modal-card modal-large" style="max-width: 680px;">
      <button class="modal-close" data-close="modal-map">&times;</button>
      <div class="modal-header" style="justify-content: space-between; align-items: center; width: 100%;">
        <div style="display: flex; align-items: center; gap: 14px;">
          <span class="modal-emoji">🗺️</span>
          <h2>世界地图 · 快速传送</h2>
        </div>
      </div>
      <div class="modal-body no-padding" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
        <div class="world-map-container">
          <div class="world-map-canvas">
            <div class="map-decor compass">🧭</div>
            <div class="map-decor sea-monster">🐳</div>
            <div class="map-decor clouds cloud-1">☁️</div>
            <div class="map-decor clouds cloud-2">☁️</div>
            
            <div class="map-node node-island" data-map="island">
              <div class="node-icon">🌴</div>
              <div class="node-label">海岛广场</div>
              <div class="node-status">公共区域</div>
            </div>
            
            <div class="map-node node-house" data-map="house">
              <div class="node-icon">🏡</div>
              <div class="node-label">个人小家</div>
              <div class="node-status">我的空间</div>
            </div>
            
            <div class="map-node node-farm" data-map="farm">
              <div class="node-icon">🌽</div>
              <div class="node-label">我的农地</div>
              <div class="node-status">农耕种植</div>
            </div>
            
            <div class="map-node node-pk" data-map="pk_arena">
              <div class="node-icon">⚔️</div>
              <div class="node-label">竞技赛场</div>
              <div class="node-status">擂台PK</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 我的背包 (Backpack) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-bag">
    <div class="modal-card modal-large">
      <button class="modal-close" data-close="modal-bag">&times;</button>
      <div class="modal-header" style="justify-content: space-between; align-items: center; width: 100%;">
        <div style="display: flex; align-items: center; gap: 14px;">
          <span class="modal-emoji">💼</span>
          <h2>旅者囊匣 · 我的背包</h2>
        </div>
        <div class="modal-bag-coins" style="display: flex; align-items: center; gap: 6px; margin-right: 45px; font-weight: bold; color: #ffd700; font-size: 0.95rem;">
          <span>🪙</span>
          <span class="bag-coins-val">0</span>
        </div>
      </div>
      <div class="modal-body no-padding" style="display: flex; height: 100%; overflow: hidden;">
        <div class="bag-left" style="flex: 1.8; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--glass-border);">
          <div class="bag-tabs" style="display: flex; background: rgba(0,0,0,0.15); border-bottom: 1px solid var(--glass-border);">
            <button class="bag-tabactive active" data-tab="seed" style="flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;">消耗品</button>
            <button class="bag-tabactive" data-tab="decor" style="flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;">装饰品</button>
            <button class="bag-tabactive" data-tab="collect" style="flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;">珍藏品</button>
          </div>
          <div class="bag-grid scrollable" id="bag-grid" style="flex-grow: 1; padding: 16px; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 280px; width: 100%;">
            <!-- 10x4 网格 -->
          </div>
        </div>
        <div class="bag-right" id="bag-item-detail" style="flex: 1.2; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: rgba(255,255,255,0.01); width: 100%;">
          <div class="item-detail-empty" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div style="font-size: 2.6rem; opacity: 0.2;">💼</div>
            <p style="color: var(--text-muted); font-size: 0.85rem;">点击左侧背包物品查看详情</p>
          </div>
          <div class="item-detail-content" style="display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: space-between; gap: 16px;">
            <!-- 动态内容 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 5. 市集商店 (Shop) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-shop">
    <div class="modal-card modal-large">
      <button class="modal-close" data-close="modal-shop">&times;</button>
      <div class="modal-header" style="justify-content: space-between; align-items: center; width: 100%;">
        <div style="display: flex; align-items: center; gap: 14px;">
          <span class="modal-emoji">🛒</span>
          <h2>云端集市 · 市集商店</h2>
        </div>
        <div class="modal-shop-coins" style="display: flex; align-items: center; gap: 6px; margin-right: 45px; font-weight: bold; color: #ffd700; font-size: 0.95rem;">
          <span>🪙 当前金币: </span>
          <span class="shop-coins-val">0</span>
        </div>
      </div>
      <div class="modal-body no-padding" style="display: flex; height: 100%; overflow: hidden;">
        <!-- 左侧纵向磨砂玻璃 Tab -->
        <div class="shop-left" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--glass-border); background: rgba(0,0,0,0.15);">
          <button class="shop-tabactive active" data-tab="agriculture" style="padding: 16px; background: none; border: none; border-left: 4px solid #27ae60; color: #fff; text-align: left; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;">🌱 农业物资</button>
          <button class="shop-tabactive" data-tab="decorations" style="padding: 16px; background: none; border: none; border-left: 4px solid transparent; color: var(--text-muted); text-align: left; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;">🛋️ 装饰家具</button>
          <button class="shop-tabactive" data-tab="topup" style="padding: 16px; background: none; border: none; border-left: 4px solid transparent; color: var(--text-muted); text-align: left; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;">💎 金币充值</button>
        </div>
        <!-- 右侧商品展示区 -->
        <div class="shop-right scrollable" id="shop-items-container" style="flex: 3; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-height: 340px; width: 100%;">
          <!-- 动态渲染商品 -->
        </div>
      </div>
    </div>
  </div>

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./main.js"></script>
</body>
</html>
