<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>我的农场 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body id="page-farm" style="background: #0f1115; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 我的农田 (Farm) 弹窗 -->
  <div class="modal-overlay" id="modal-farm">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-farm">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🌱</span>
        <h2>浮空群岛 · 我的农地</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 20px;">
        <div class="farm-stats" style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 0.9rem; background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 10px;">
          <span>💰 当前金币: <strong id="farm-coins" style="color: #ffd700;">0</strong></span>
          <span>⭐ 农夫等级: <strong id="farm-level" style="color: #64b5f6;">1</strong> (EXP: <span id="farm-exp">0</span>/100)</span>
        </div>
        <div class="farm-grid" id="farm-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
          <!-- 2x3 农地格子 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 种子商店子弹窗 (白底磨砂玻璃) -->
  <div class="sub-modal-overlay" id="sub-modal-seed-shop" style="display: none; position: fixed; inset: 0; z-index: 200; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
    <div class="sub-modal-card" style="background: rgba(255, 255, 255, 0.9); color: #2c3e50; padding: 24px; border-radius: 20px; width: 90%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative;">
      <button class="sub-modal-close" id="btn-close-seed-shop" style="position: absolute; top: 16px; right: 16px; font-size: 1.5rem; background: none; border: none; cursor: pointer; color: #7f8c8d;">&times;</button>
      <div class="sub-modal-header" style="margin-bottom: 16px;">
        <h3 style="font-size: 1.2rem; color: #27ae60; font-weight: bold;">🌱 种子商店</h3>
      </div>
      <div class="sub-modal-body" style="display: flex; flex-direction: column; gap: 14px;">
        <div class="seed-item" style="display: flex; align-items: center; gap: 12px; background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid #eef2f3;">
          <span class="seed-icon" style="font-size: 2.2rem;">🌻</span>
          <div class="seed-info" style="flex: 1;">
            <h4 style="font-size: 0.95rem; font-weight: bold; margin-bottom: 2px;">向日葵种子</h4>
            <p style="font-size: 0.72rem; color: #7f8c8d; line-height: 1.2;">成熟需要 30 秒。收割可获得 20 金币 + 15 经验。</p>
          </div>
          <button class="buy-btn" data-seed="sunflower_seed" style="padding: 6px 10px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer;">购买 (10金币)</button>
        </div>
        <div class="seed-item" style="display: flex; align-items: center; gap: 12px; background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid #eef2f3;">
          <span class="seed-icon" style="font-size: 2.2rem;">🍓</span>
          <div class="seed-info" style="flex: 1;">
            <h4 style="font-size: 0.95rem; font-weight: bold; margin-bottom: 2px;">草莓种子</h4>
            <p style="font-size: 0.72rem; color: #7f8c8d; line-height: 1.2;">成熟需要 60 秒。收割可获得 45 金币 + 35 经验。</p>
          </div>
          <button class="buy-btn" data-seed="strawberry_seed" style="padding: 6px 10px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer;">购买 (20金币)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 2. 排行榜 (Leaderboard) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-leaderboard">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-leaderboard">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🏆</span>
        <h2>个人大厅 · 排行榜</h2>
      </div>
      <div class="modal-body no-padding" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
        <div class="leaderboard-tabs">
          <button class="tab-btn active" data-tab="pkPoints">⚔️ 战力榜</button>
          <button class="tab-btn" data-tab="coins">💰 财富榜</button>
          <button class="tab-btn" data-tab="level">✨ 等级榜</button>
        </div>
        <div class="leaderboard-container scrollable" style="flex-grow: 1; padding: 20px; overflow-y: auto;">
          <div class="leaderboard-list-view" id="leaderboard-list-view">
            <!-- 动态生成排行 -->
          </div>
        </div>
        <div class="leaderboard-my-rank" id="leaderboard-my-rank">
          <!-- 当前用户排行 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 3. 每日任务 (Tasks) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-tasks">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-tasks">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">📋</span>
        <h2>治愈旅途 · 每日任务</h2>
      </div>
      <div class="modal-body scrollable" style="padding: 20px;">
        <div class="tasks-list" id="tasks-list">
          <!-- 动态生成任务 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 我的背包 (Backpack) 弹窗 (公共) -->
  <div class="modal-overlay" id="modal-bag">
    <div class="modal-card modal-large">
      <button class="modal-close" data-close="modal-bag">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">💼</span>
        <h2>旅者囊匣 · 我的背包</h2>
      </div>
      <div class="modal-body no-padding" style="display: flex; height: 100%; overflow: hidden;">
        <div class="bag-left" style="flex: 1.8; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--glass-border);">
          <div class="bag-tabs" style="display: flex; background: rgba(0,0,0,0.15); border-bottom: 1px solid var(--glass-border);">
            <button class="bag-tabactive active" data-tab="seed" style="flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;">消耗品</button>
            <button class="bag-tabactive" data-tab="decor" style="flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;">装饰品</button>
            <button class="bag-tabactive" data-tab="collect" style="flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;">珍藏品</button>
          </div>
          <div class="bag-grid scrollable" id="bag-grid" style="flex-grow: 1; padding: 16px; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 280px; width: 100%;">
            <!-- 10x4 网格 -->
          </div>
        </div>
        <div class="bag-right" id="bag-item-detail" style="flex: 1.2; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: rgba(255,255,255,0.01); width: 100%;">
          <div class="item-detail-empty" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div style="font-size: 2.6rem; opacity: 0.2;">💼</div>
            <p style="color: var(--text-muted); font-size: 0.85rem;">点击左侧背包物品查看详情</p>
          </div>
          <div class="item-detail-content" style="display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: space-between; gap: 16px;">
            <!-- 动态内容 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./main.js"></script>
</body>
</html>
