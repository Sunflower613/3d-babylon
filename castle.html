<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>粉色庄园 | 3D 治愈群岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body id="page-castle" style="background: #0d0910; overflow: hidden; margin: 0; height: 100%;">
  <!-- 3D 渲染画布容器 -->
  <div id="canvas-container"></div>

  <!-- -------------------- 弹窗层 (Modal Overlays) -------------------- -->

  <!-- 1. 关于我 (About Me) 弹窗 -->
  

  <!-- 2. 技术栈 (Skills) 弹窗 -->
  

  <!-- 3. 项目展示 (Projects) 弹窗 -->
  

  <!-- 4. 复古街机 21点游戏 (Arcade) 弹窗 -->
  <div class="modal-overlay" id="modal-arcade">
    <div class="modal-card modal-game">
      <button class="modal-close" id="btn-close-arcade" data-close="modal-arcade">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🕹️</span>
        <h2 id="arcade-title">复古街机 · 游戏大厅</h2>
      </div>
      <div class="modal-body no-padding"></div>
    </div>
  </div>

  <!-- 5. 排行榜 (Leaderboard) 弹窗 (公共) -->
  

  <!-- 6. 每日任务 (Tasks) 弹窗 (公共) -->
  

  <!-- 7. 2D世界地图 (World Map) 弹窗 -->
  

  <!-- 8. 我的背包 (Backpack) 弹窗 (公共) -->
  

  <!-- 9. 市集商店 (Shop) 弹窗 (公共) -->
  

  <!-- 10. 退出确认 (Exit Confirm) 弹窗 -->
  <div class="modal-overlay" id="modal-exit">
    <div class="modal-card">
      <button class="modal-close" data-close="modal-exit">&times;</button>
      <div class="modal-header">
        <span class="modal-emoji">🚪</span>
        <h2>传送确认</h2>
      </div>
      <div class="modal-body" style="padding: 24px; text-align: center;">
        <p style="color: #fff; font-size: 1rem; margin-bottom: 24px;">你确定要离开粉色庄园，传送回海岛大厅吗？</p>
        <div style="display: flex; justify-content: center; gap: 16px;">
          <button class="hud-btn" id="btn-exit-confirm" style="background: linear-gradient(135deg, #e91e63, #c2185b); border: none;">确定</button>
          <button class="hud-btn" data-close="modal-exit" style="background: rgba(255,255,255,0.1);">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- -------------------- 常驻 HUD & 交互面板 -------------------- -->

  <!-- 起身离开/起床 (Exit Sitting/Sleeping) HUD -->
  <div id="exit-sitting-hud" class="sitting-hud" style="display: none;">
    <div class="sitting-hud-content" style="background: rgba(233, 30, 99, 0.45); border: 1px solid rgba(255, 105, 180, 0.35);">
      <span id="exit-sitting-hud-text">🧘 您正在静坐观赏中</span>
      <button id="btn-exit-sitting" class="hud-btn" style="background: linear-gradient(135deg, #ff4081, #f50057);">起身/起床</button>
    </div>
  </div>

  <!-- Device rotation overlay (visible on mobile in portrait mode) -->
  <div id="rotation-overlay">
    <div class="rotation-message">
      <div class="phone-icon-animate">🔄📱</div>
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 8px;">为了获得最佳体验，请旋转手机至横屏模式</p>
      <span style="font-size:0.75rem; color:var(--text-muted);">Please rotate your device to landscape</span>
    </div>
  </div>

  <!-- Screen fade transition overlay -->
  <div id="fade-overlay"></div>

  <!-- 引入主逻辑 -->
  <script type="module" src="./src/ui/app-shell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
